<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <style>
    body { background: transparent; margin: 0; overflow: hidden; }

    #now-playing {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 50px;
      padding: 10px 20px 10px 14px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }

    #now-playing.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #now-playing svg {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    #np-username {
      color: #fff;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 18px;
      font-weight: 600;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>

<script>
  const RECONNECT_BASE_MS = 1000;
  const RECONNECT_MAX_MS = 30000;

  const queue = [];
  let isPlaying = false;
  let ws = null;
  let reconnectDelay = RECONNECT_BASE_MS;

  const nowPlaying = document.getElementById('now-playing');
  const npUsername = document.getElementById('np-username');

  function showSpeaker(username) {
    npUsername.textContent = '@' + username;
    nowPlaying.classList.add('visible');
  }

  function hideSpeaker() {
    nowPlaying.classList.remove('visible');
  }

  function notifyDone(url) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ done: url.split("/").pop() }));
    }
  }

  function playNext() {
    if (isPlaying || queue.length === 0) return;
    const { url, username } = queue.shift();
    isPlaying = true;
    const fullUrl = location.origin + url;
    console.log(`[${username}] ${fullUrl}`);
    showSpeaker(username);
    const audio = new Audio(fullUrl);
    audio.onended = () => { notifyDone(url); isPlaying = false; hideSpeaker(); playNext(); };
    audio.onerror = () => {
      console.error(`Failed to play: ${fullUrl}`);
      notifyDone(url);
      isPlaying = false;
      hideSpeaker();
      playNext();
    };
    audio.play();
  }

  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => {
      console.log("voxer connected");
      reconnectDelay = RECONNECT_BASE_MS;
    };

    ws.onclose = () => {
      console.warn(`voxer disconnected, reconnecting in ${reconnectDelay}ms`);
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX_MS);
    };

    ws.onerror = (err) => {
      console.error("voxer error:", err);
      ws.close();
    };

    ws.onmessage = (event) => {
      queue.push(JSON.parse(event.data));
      playNext();
    };
  }

  connect();
</script>
