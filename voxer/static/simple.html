<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      width: 100%; height: 100%;
      margin: 0; overflow: hidden;
      background: transparent;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
    }

    /* ── Base particle ── */
    .fp {
      position: fixed;
      pointer-events: none;
      object-fit: contain;
      transform-origin: center center;
      will-change: transform, opacity;
    }

    /* ── 1. Corner Sparks: S-curve flame flicker ── */
    .fp-spark {
      animation: anim-spark var(--dur) var(--ease) var(--delay) forwards;
    }
    @keyframes anim-spark {
      0%  { opacity: 0;   transform: translate(0,0) scale(.18) rotate(var(--r0)); }
      9%  { opacity: 1;   transform: translate(calc(var(--dx)*.06 + var(--w)), calc(var(--dy)*.06)) scale(.82) rotate(calc(var(--r0)*.6)); }
      32% { opacity: .92; transform: translate(calc(var(--dx)*.28 - var(--w)*.8), calc(var(--dy)*.28)) scale(1.12) rotate(calc(var(--r0)*-.1)); }
      58% { opacity: .78; transform: translate(calc(var(--dx)*.54 + var(--w)*.5), calc(var(--dy)*.54)) scale(.92) rotate(calc(var(--r1)*.4)); }
      80% { opacity: .34; transform: translate(calc(var(--dx)*.80 - var(--w)*.15), calc(var(--dy)*.80)) scale(.58) rotate(var(--r1)); }
      100%{ opacity: 0;   transform: translate(var(--dx), var(--dy)) scale(.2) rotate(var(--r1)); }
    }

    /* ── 2. Corner Drops: gravity fall from each corner ── */
    .fp-drop {
      animation: anim-drop var(--dur) cubic-bezier(.42,0,.76,1) var(--delay) forwards;
    }
    @keyframes anim-drop {
      0%  { opacity: 0;  transform: translate(0,0) scale(.5) rotate(var(--r0)); }
      7%  { opacity: 1;  transform: translate(calc(var(--dx)*.02), calc(var(--dy)*.005)) scale(1.08) rotate(calc(var(--r0)*.5)); }
      92% { opacity: .6; transform: translate(calc(var(--dx)*.96), calc(var(--dy)*.96)) scale(.72) rotate(calc(var(--r0)*.3)); }
      100%{ opacity: 0;  transform: translate(var(--dx), var(--dy)) scale(.4) rotate(var(--r0)); }
    }

    /* ── 3. Rain: angled fall across full screen ── */
    .fp-rain {
      animation: anim-rain var(--dur) linear var(--delay) forwards;
    }
    @keyframes anim-rain {
      0%  { opacity: 0;   transform: translate(0,0) rotate(var(--r)) scale(.68); }
      5%  { opacity: .88; }
      88% { opacity: .72; }
      100%{ opacity: 0;   transform: translate(var(--rdx), var(--rdy)) rotate(var(--r)) scale(.68); }
    }

    /* ── 4. Bottom Train: horizontal march near bottom ── */
    .fp-train {
      animation: anim-train var(--dur) linear var(--delay) forwards;
    }
    @keyframes anim-train {
      0%  { opacity: 0; transform: translateX(0); }
      4%  { opacity: 1; }
      96% { opacity: 1; }
      100%{ opacity: 0; transform: translateX(var(--tdx)); }
    }

    /* ── 5. Smash & Fall: impact burst then gravity drop ── */
    .fp-smash {
      animation: anim-smash var(--dur) cubic-bezier(.18,0,.36,1) var(--delay) forwards;
    }
    @keyframes anim-smash {
      0%  { opacity: 0; transform: translate(0,0) scale(3.2) rotate(var(--r0)); filter: brightness(3.5); }
      7%  { opacity: 1; transform: translate(0,0) scale(.72) rotate(calc(var(--r0)*-.5)); filter: brightness(2.2); }
      14% { transform: translate(calc(var(--sx)*.02), calc(var(--sy)*.04)) scale(1.18) rotate(var(--r0)); filter: brightness(1.5); }
      26% { transform: translate(calc(var(--sx)*.06), calc(var(--sy)*.12)) scale(1.0); filter: brightness(1.1); }
      55% { opacity: .85; transform: translate(calc(var(--sx)*.45), calc(var(--sy)*.50)) scale(.88); filter: brightness(1); }
      84% { opacity: .35; }
      100%{ opacity: 0;   transform: translate(var(--sx), var(--sy)) scale(.3) rotate(var(--r1)); filter: brightness(1); }
    }

    /* ── Username badge ── */
    #np-badge {
      position: fixed;
      bottom: 26px; left: 50%;
      transform: translateX(-50%) translateY(10px) scale(.96);
      display: flex; align-items: center; gap: 9px;
      padding: 7px 18px 7px 12px;
      background:
        linear-gradient(135deg, rgba(11,18,26,.86), rgba(18,14,28,.80)),
        linear-gradient(90deg,  rgba(85,230,255,.22), rgba(255,79,216,.16));
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 999px;
      box-shadow: 0 10px 28px rgba(0,0,0,.38), 0 0 24px rgba(85,230,255,.15);
      color: #fff;
      pointer-events: none; opacity: 0;
      transition: opacity 240ms ease, transform 300ms cubic-bezier(.2,.9,.2,1);
      z-index: 50;
    }
    #np-badge.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }
    #np-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #55e6ff; box-shadow: 0 0 8px #55e6ff; flex-shrink: 0;
    }
    #np-badge.visible #np-dot { animation: dot-pulse 640ms ease-in-out infinite alternate; }
    @keyframes dot-pulse {
      from { transform: scale(.72); opacity: .62; box-shadow: 0 0 5px  #55e6ff; }
      to   { transform: scale(1.42); opacity: 1;  box-shadow: 0 0 18px #55e6ff; }
    }
    #np-name {
      font-size: 17px; font-weight: 740; line-height: 1;
      text-shadow: 0 1px 8px rgba(0,0,0,.72);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 300px;
    }
  </style>
</head>
<body>

<div id="np-badge">
  <span id="np-dot"></span>
  <span id="np-name"></span>
</div>

<script>
  const RECONNECT_BASE_MS = 1000;
  const RECONNECT_MAX_MS  = 30000;

  const queue = [];
  let isPlaying     = false;
  let ws            = null;
  let reconnectDelay = RECONNECT_BASE_MS;
  let activeEmotes  = [];
  let spawnTimer    = null;
  const pending     = []; // setTimeout handles for cleanup

  const npBadge = document.getElementById("np-badge");
  const npName  = document.getElementById("np-name");

  // ── Helpers ──────────────────────────────────────────────────────────────
  const rnd  = (a, b) => a + Math.random() * (b - a);
  const pick = arr   => arr[Math.floor(Math.random() * arr.length)];

  function later(fn, ms) {
    const t = setTimeout(fn, ms);
    pending.push(t);
    return t;
  }

  function particle(emote, cls, left, top, size, props) {
    const img = new Image();
    img.className = `fp ${cls}`;
    img.src = emote.url;
    img.alt = emote.name;
    const s = [
      `left:${left.toFixed(1)}px`,
      `top:${top.toFixed(1)}px`,
      `width:${size.toFixed(1)}px`,
      `height:${size.toFixed(1)}px`,
    ];
    for (const [k, v] of Object.entries(props)) s.push(`${k}:${v}`);
    img.style.cssText = s.join(";");
    document.body.appendChild(img);
    img.addEventListener("animationend", () => img.remove(), { once: true });
  }

  // ── Effect 1: Corner Sparks ───────────────────────────────────────────────
  const SPARK_EASES = [
    "cubic-bezier(.10,.82,.28,1)",
    "cubic-bezier(.16,.74,.30,1)",
    "cubic-bezier(.08,.88,.22,1)",
  ];

  function spawnSpark(ci) {
    if (!activeEmotes.length) return;
    const iw = window.innerWidth, ih = window.innerHeight;
    const corners = [
      { x:[0,90],     y:[ih-90,ih],  dx:[40,200],   dy:[-260,-480] }, // BL ↑→
      { x:[iw-90,iw], y:[ih-90,ih],  dx:[-40,-200], dy:[-260,-480] }, // BR ↑←
      { x:[0,90],     y:[0,90],      dx:[40,200],   dy:[260,480]   }, // TL ↓→
      { x:[iw-90,iw], y:[0,90],      dx:[-40,-200], dy:[260,480]   }, // TR ↓←
    ];
    const c = corners[ci], size = rnd(22,46);
    const r0 = rnd(-22,22), r1 = r0 + rnd(-45,45);
    particle(pick(activeEmotes), "fp-spark",
      rnd(c.x[0],c.x[1]) - size/2, rnd(c.y[0],c.y[1]) - size/2, size, {
        "--dx":    `${rnd(c.dx[0],c.dx[1]).toFixed(1)}px`,
        "--dy":    `${rnd(c.dy[0],c.dy[1]).toFixed(1)}px`,
        "--w":     `${rnd(-44,44).toFixed(1)}px`,
        "--dur":   `${Math.round(rnd(1300,2700))}ms`,
        "--delay": `${Math.round(rnd(0,160))}ms`,
        "--ease":  pick(SPARK_EASES),
        "--r0":    `${r0.toFixed(1)}deg`,
        "--r1":    `${r1.toFixed(1)}deg`,
      });
  }

  function effectCornerSparks() {
    for (let ci = 0; ci < 4; ci++)
      for (let i = 0; i < 16; i++)
        later(() => spawnSpark(ci), i * 48);
    spawnTimer = setInterval(() => {
      for (let ci = 0; ci < 4; ci++) {
        spawnSpark(ci);
        if (Math.random() < .55) spawnSpark(ci);
      }
    }, 100);
  }

  // ── Effect 2: Corner Drops ────────────────────────────────────────────────
  function spawnDrop(ci) {
    if (!activeEmotes.length) return;
    const iw = window.innerWidth, ih = window.innerHeight;
    const corners = [
      { x:[0,80],     y:[0,80],      dx:[15,110],   dy:[220,500]  }, // TL ↓→
      { x:[iw-80,iw], y:[0,80],      dx:[-15,-110], dy:[220,500]  }, // TR ↓←
      { x:[0,80],     y:[ih-80,ih],  dx:[15,110],   dy:[-220,-500]}, // BL ↑→
      { x:[iw-80,iw], y:[ih-80,ih],  dx:[-15,-110], dy:[-220,-500]}, // BR ↑←
    ];
    const c = corners[ci], size = rnd(24,44);
    const r0 = rnd(-15,15);
    particle(pick(activeEmotes), "fp-drop",
      rnd(c.x[0],c.x[1]) - size/2, rnd(c.y[0],c.y[1]) - size/2, size, {
        "--dx":    `${rnd(c.dx[0],c.dx[1]).toFixed(1)}px`,
        "--dy":    `${rnd(c.dy[0],c.dy[1]).toFixed(1)}px`,
        "--r0":    `${r0.toFixed(1)}deg`,
        "--dur":   `${Math.round(rnd(900,1600))}ms`,
        "--delay": `${Math.round(rnd(0,120))}ms`,
      });
  }

  function effectCornerDrops() {
    for (let ci = 0; ci < 4; ci++)
      for (let i = 0; i < 12; i++)
        later(() => spawnDrop(ci), i * 60);
    spawnTimer = setInterval(() => {
      for (let ci = 0; ci < 4; ci++) {
        spawnDrop(ci);
        if (Math.random() < .4) spawnDrop(ci);
      }
    }, 130);
  }

  // ── Effect 3: Full-screen Rain ────────────────────────────────────────────
  function spawnRainDrop() {
    if (!activeEmotes.length) return;
    const iw = window.innerWidth, ih = window.innerHeight;
    const size  = rnd(18,34);
    const angle = rnd(4,16) * Math.PI / 180 * (Math.random() < .5 ? 1 : -1);
    const dist  = ih + size * 2;
    particle(pick(activeEmotes), "fp-rain",
      rnd(0,iw) - size/2, -size, size, {
        "--rdx":   `${(Math.sin(angle) * dist).toFixed(1)}px`,
        "--rdy":   `${(Math.cos(angle) * dist).toFixed(1)}px`,
        "--r":     `${(angle * 180 / Math.PI).toFixed(1)}deg`,
        "--dur":   `${Math.round(rnd(600,1200))}ms`,
        "--delay": `${Math.round(rnd(0,80))}ms`,
      });
  }

  function effectRain() {
    for (let i = 0; i < 44; i++) later(spawnRainDrop, i * 38);
    spawnTimer = setInterval(() => {
      spawnRainDrop();
      if (Math.random() < .7) spawnRainDrop();
    }, 75);
  }

  // ── Effect 4: Bottom-line Trains ──────────────────────────────────────────
  function spawnTrainCar(row, direction, size, speed) {
    if (!activeEmotes.length) return;
    const iw = window.innerWidth, ih = window.innerHeight;
    const dist = iw + size * 2;
    const left = direction === 1 ? -size : iw;
    const top  = ih - 24 - size - row * (size + 14);
    particle(pick(activeEmotes), "fp-train", left, top, size, {
      "--tdx":   `${(direction * dist).toFixed(1)}px`,
      "--dur":   `${Math.round(speed)}ms`,
      "--delay": "0ms",
    });
  }

  function launchTrainRow(row) {
    const dir   = Math.random() < .5 ? 1 : -1;
    const count = Math.round(rnd(8,16));
    const size  = rnd(34,48);
    const speed = rnd(2400,3600);
    const gap   = rnd(55,100);
    for (let i = 0; i < count; i++)
      later(() => spawnTrainCar(row, dir, size, speed), i * gap);
  }

  function effectBottomTrain() {
    function wave() {
      if (!activeEmotes.length) return;
      const rows = Math.round(rnd(2,4));
      for (let r = 0; r < rows; r++)
        later(() => launchTrainRow(r), r * 280);
      later(wave, rnd(3800,5200));
    }
    wave();
  }

  // ── Effect 5: Smash & Fall ────────────────────────────────────────────────
  function spawnSmash() {
    if (!activeEmotes.length) return;
    const iw = window.innerWidth, ih = window.innerHeight;
    const size = rnd(32,58);
    const r0   = rnd(-30,30);
    particle(pick(activeEmotes), "fp-smash",
      rnd(iw*.08, iw*.92) - size/2, rnd(ih*.05, ih*.62) - size/2, size, {
        "--sx":    `${rnd(-50,50).toFixed(1)}px`,
        "--sy":    `${rnd(130,320).toFixed(1)}px`,
        "--r0":    `${r0.toFixed(1)}deg`,
        "--r1":    `${(r0 + rnd(-90,90)).toFixed(1)}deg`,
        "--dur":   `${Math.round(rnd(1200,2200))}ms`,
        "--delay": `${Math.round(rnd(0,100))}ms`,
      });
  }

  function effectSmashFall() {
    for (let i = 0; i < 22; i++)
      later(spawnSmash, i * 70 + rnd(0,50));
    spawnTimer = setInterval(() => {
      spawnSmash();
      if (Math.random() < .45) spawnSmash();
    }, 180);
  }

  // ── Random effect picker ──────────────────────────────────────────────────
  const EFFECTS = [
    effectCornerSparks,
    effectCornerDrops,
    effectRain,
    effectBottomTrain,
    effectSmashFall,
  ];

  function startFire(emotes) {
    stopFire();
    activeEmotes = emotes;
    pick(EFFECTS)();
  }

  function stopFire() {
    clearInterval(spawnTimer);
    spawnTimer = null;
    while (pending.length) clearTimeout(pending.pop());
    activeEmotes = [];
  }

  // ── Badge ─────────────────────────────────────────────────────────────────
  function showBadge(username) {
    npName.textContent = "@" + username;
    npBadge.classList.add("visible");
  }
  function hideBadge() { npBadge.classList.remove("visible"); }

  // ── Audio queue ───────────────────────────────────────────────────────────
  function notifyDone(audio_url) {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ done: audio_url.split("/").pop() }));
  }

  function playNext() {
    if (isPlaying || queue.length === 0) return;
    const { audio_url, username, emotes } = queue.shift();
    isPlaying = true;

    showBadge(username);
    if (emotes && emotes.length > 0) startFire(emotes);

    const audio  = new Audio(location.origin + audio_url);
    const onDone = () => {
      notifyDone(audio_url);
      isPlaying = false;
      stopFire();
      hideBadge();
      playNext();
    };
    audio.onended = onDone;
    audio.onerror = onDone;
    audio.play().catch(onDone);
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connect() {
    const protocol = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${protocol}://${location.host}/ws`);
    ws.onopen    = () => { console.log("voxer-simple connected"); reconnectDelay = RECONNECT_BASE_MS; };
    ws.onclose   = () => {
      console.warn(`voxer-simple disconnected, reconnecting in ${reconnectDelay}ms`);
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX_MS);
    };
    ws.onerror   = () => ws.close();
    ws.onmessage = ev => { queue.push(JSON.parse(ev.data)); playNext(); };
  }

  connect();
</script>
</body>
</html>
